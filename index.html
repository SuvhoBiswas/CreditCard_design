<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>testweb</title>
</head>
<body>
    <section>
        <div class="container">
            <div class="card font-size">
            <header>
                <span class="logo">
                    <img src="image/logo.png" alt="" >
                    <h5>Master Card</h5>
                    <img src="image/chip.png" alt="" class = "chip">
                </span>
            </header>

            <div class="card-details">
                <div class="card-number">
                    <h6>card Number</h6>
                    <h5 class="number">1234 5678 9012 3456</h5>
                    <h5 class="name">Suvho Biswas</h5>
                </div>
                <div class="valid-date">
                    <h6>valid Thru</h6>
                    <h5>08/31</h5>
                    
                </div>
            </div>
            </div>
            <div class="card back-size">
                <h6>For 24 hour customer services +8802 00000-8/16001</h6>
                <span class="magnetic-strip"></span>
                <div class="signature"><i>005</i></div>

                <h5>
                    use of this card governed by the conditions
                     of credit card agreement. This card should 
                     be signed by the authorised user and will 
                     remain the property of bank
                </h5>
                   
                  
                
                
            </div>
        </div>
    </section>
</body>
</html>
